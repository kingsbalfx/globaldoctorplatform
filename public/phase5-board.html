<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 5 Board</title><style>body{font-family:Arial;background:#f8fafc;color:#0f172a;margin:0}main{max-width:1000px;margin:auto;padding:28px}.hero{background:#111827;color:#fff;border-radius:24px;padding:28px}.grid{display:grid;gap:16px;margin-top:20px}@media(min-width:850px){.grid{grid-template-columns:repeat(3,1fr)}}.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}input,button{width:100%;box-sizing:border-box;margin-top:10px;border-radius:14px;padding:12px;border:1px solid #cbd5e1}button{background:#0f766e;color:#fff;border:0;font-weight:800}.alt{background:#0f172a}.note{background:#dcfce7;color:#166534;padding:12px;border-radius:14px;margin-top:14px;font-weight:700}pre{background:#020617;color:#e2e8f0;border-radius:20px;padding:16px;white-space:pre-wrap;max-height:420px;overflow:auto}.stats{display:grid;gap:12px;margin-top:18px}@media(min-width:700px){.stats{grid-template-columns:repeat(4,1fr)}}.stat{background:#f1f5f9;border-radius:18px;padding:14px}.stat b{display:block;font-size:24px}</style></head><body><main><section class="hero"><h1>Phase 5 Board</h1><p>Service prices, patient balances, invoices and reconciliation notes.</p></section><p id="note" class="note">Ready</p><div class="stats"><div class="stat">Services<b id="a">0</b></div><div class="stat">Balances<b id="b">0</b></div><div class="stat">Invoices<b id="c">0</b></div><div class="stat">Notes<b id="d">0</b></div></div><div class="grid"><div class="card"><h2>Service</h2><input id="s1" placeholder="Service"><input id="s2" placeholder="Amount"><button onclick="add('services',{name:v('s1'),amount:v('s2')})">Save</button></div><div class="card"><h2>Balance</h2><input id="w1" placeholder="Patient code"><input id="w2" placeholder="Amount"><button onclick="add('balances',{patient:v('w1'),amount:v('w2')})">Save</button></div><div class="card"><h2>Invoice</h2><input id="i1" placeholder="Patient code"><input id="i2" placeholder="Total"><button onclick="add('invoices',{patient:v('i1'),total:v('i2')})">Save</button></div><div class="card"><h2>Note</h2><input id="n1" placeholder="Reference"><input id="n2" placeholder="Status"><button onclick="add('notes',{reference:v('n1'),status:v('n2')})">Save</button></div><div class="card"><h2>Tools</h2><button onclick="render()">Refresh</button><button class="alt" onclick="clearAll()">Clear</button></div></div><pre id="out"></pre></main><script>const key='gd_phase5_board';const v=id=>document.getElementById(id).value;const blank=()=>({services:[],balances:[],invoices:[],notes:[]});function state(){try{return JSON.parse(localStorage.getItem(key)||'null')||blank()}catch{return blank()}}function save(x){localStorage.setItem(key,JSON.stringify(x));render()}function add(k,o){const x=state();x[k].unshift({id:k+'-'+Date.now(),...o,createdAt:new Date().toISOString()});save(x);document.getElementById('note').textContent='Saved'}function render(){const x=state();document.getElementById('a').textContent=x.services.length;document.getElementById('b').textContent=x.balances.length;document.getElementById('c').textContent=x.invoices.length;document.getElementById('d').textContent=x.notes.length;document.getElementById('out').textContent=JSON.stringify(x,null,2)}function clearAll(){localStorage.removeItem(key);render()}render()</script></body></html>
