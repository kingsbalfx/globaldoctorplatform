<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 5 Board</title><style>body{font-family:Arial;background:#f8fafc;color:#0f172a;margin:0}main{max-width:900px;margin:auto;padding:28px}.hero{background:#111827;color:#fff;border-radius:24px;padding:28px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px;margin-top:16px}textarea,select,button{width:100%;box-sizing:border-box;margin-top:10px;border-radius:14px;padding:12px;border:1px solid #cbd5e1}button{background:#0f766e;color:#fff;border:0;font-weight:800}pre{background:#020617;color:#e2e8f0;border-radius:20px;padding:16px;white-space:pre-wrap}</style></head><body><main><section class="hero"><h1>Phase 5 Upgrade Board</h1><p>Language intake, text organization, staff summary and safety review.</p></section><section class="card"><select id="lang"><option>English</option><option>Hausa</option><option>Yoruba</option><option>Igbo</option></select><textarea id="text" rows="8" placeholder="Write intake or request"></textarea><button onclick="run()">Create summary</button></section><pre id="out"></pre></main><script>function run(){const text=document.getElementById('text').value.replace(/[<>]/g,'');const lines=text.split(/[.!?\n]/).map(x=>x.trim()).filter(Boolean).slice(0,8);document.getElementById('out').textContent=JSON.stringify({language:document.getElementById('lang').value,summary:lines,notice:'summary only; staff review required',createdAt:new Date().toISOString()},null,2)}</script></body></html>
