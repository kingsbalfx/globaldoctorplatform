<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 4 Board</title><style>body{font-family:Arial;background:#f8fafc;color:#0f172a;margin:0}main{max-width:1000px;margin:auto;padding:28px}.hero{background:#0f172a;color:white;border-radius:24px;padding:28px}.grid{display:grid;gap:16px;margin-top:20px}@media(min-width:850px){.grid{grid-template-columns:repeat(3,1fr)}}.card{background:white;border:1px solid #e2e8f0;border-radius:20px;padding:18px}input,textarea,button{width:100%;box-sizing:border-box;margin-top:10px;border-radius:14px;padding:12px;border:1px solid #cbd5e1}button{background:#0f766e;color:white;border:0;font-weight:800}pre{background:#020617;color:#e2e8f0;border-radius:20px;padding:16px;white-space:pre-wrap;max-height:420px;overflow:auto}.ok{background:#dcfce7;color:#166534;padding:12px;border-radius:14px;margin-top:14px;font-weight:700}</style></head><body><main><section class="hero"><h1>Phase 4 Board</h1><p>Programs, tasks, campaigns, stock alerts and quality metrics.</p></section><p id="note" class="ok">Ready</p><div class="grid"><div class="card"><h2>Program</h2><input id="p1" placeholder="Name"><input id="p2" placeholder="Group"><button onclick="add('programs',{name:v('p1'),group:v('p2')})">Save</button></div><div class="card"><h2>Task</h2><input id="t1" placeholder="Code"><input id="t2" placeholder="Task"><button onclick="add('tasks',{code:v('t1'),task:v('t2')})">Save</button></div><div class="card"><h2>Campaign</h2><input id="c1" placeholder="Name"><textarea id="c2" placeholder="Message"></textarea><button onclick="add('campaigns',{name:v('c1'),message:v('c2')})">Save</button></div><div class="card"><h2>Stock</h2><input id="s1" placeholder="Item"><input id="s2" placeholder="Level"><button onclick="add('stock',{item:v('s1'),level:v('s2')})">Save</button></div><div class="card"><h2>Metric</h2><input id="m1" placeholder="Metric"><input id="m2" placeholder="Value"><button onclick="add('metrics',{metric:v('m1'),value:v('m2')})">Save</button></div><div class="card"><h2>Tools</h2><button onclick="clearAll()">Clear</button><button onclick="render()">Refresh</button></div></div><pre id="out"></pre></main><script>const key='gd_phase4_board';const v=id=>document.getElementById(id).value;function state(){return JSON.parse(localStorage.getItem(key)||'{"programs":[],"tasks":[],"campaigns":[],"stock":[],"metrics":[]}')}function save(d){localStorage.setItem(key,JSON.stringify(d));render()}function add(k,obj){const d=state();d[k].unshift({id:k+'-'+Date.now(),...obj,createdAt:new Date().toISOString()});save(d);document.getElementById('note').textContent='Saved'}function render(){document.getElementById('out').textContent=JSON.stringify(state(),null,2)}function clearAll(){localStorage.removeItem(key);render()}render()</script></body></html>
