<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Phase 4 Compliance</title><style>body{font-family:Arial;background:#f8fafc;color:#0f172a;margin:0}main{max-width:1000px;margin:auto;padding:28px}.hero{background:#0f172a;color:white;border-radius:24px;padding:28px}.grid{display:grid;gap:16px;margin-top:20px}@media(min-width:850px){.grid{grid-template-columns:repeat(3,1fr)}}.card{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:18px}input,textarea,button{width:100%;box-sizing:border-box;margin-top:10px;border-radius:14px;padding:12px;border:1px solid #cbd5e1}button{background:#0f766e;color:#fff;border:0;font-weight:800}.alt{background:#0f172a}.note{background:#dcfce7;color:#166534;padding:12px;border-radius:14px;margin-top:14px;font-weight:700}pre{background:#020617;color:#e2e8f0;border-radius:20px;padding:16px;white-space:pre-wrap;max-height:420px;overflow:auto}</style></head><body><main><section class="hero"><h1>Phase 4 Compliance Board</h1><p>Roles, file logs, data requests and consent history.</p></section><p id="note" class="note">Ready</p><div class="grid"><div class="card"><h2>Role permission</h2><input id="r1" placeholder="Role"><input id="r2" placeholder="Permission"><button onclick="add('roles',{role:v('r1'),permission:v('r2')})">Save</button></div><div class="card"><h2>File log</h2><input id="f1" placeholder="File"><input id="f2" placeholder="Reason"><button onclick="add('files',{file:v('f1'),reason:v('f2')})">Save</button></div><div class="card"><h2>Data request</h2><input id="d1" placeholder="Patient code"><input id="d2" placeholder="Request type"><button onclick="add('requests',{code:v('d1'),type:v('d2')})">Save</button></div><div class="card"><h2>Consent event</h2><input id="c1" placeholder="Patient code"><input id="c2" placeholder="Consent type"><button onclick="add('consents',{code:v('c1'),type:v('c2')})">Save</button></div><div class="card"><h2>MFA ready</h2><input id="m1" placeholder="User"><input id="m2" placeholder="Method"><button onclick="add('mfa',{user:v('m1'),method:v('m2')})">Save</button></div><div class="card"><h2>Tools</h2><button onclick="render()">Refresh</button><button class="alt" onclick="clearAll()">Clear</button></div></div><pre id="out"></pre></main><script>const key='gd_phase4_compliance';const v=id=>document.getElementById(id).value;const blank=()=>({roles:[],files:[],requests:[],consents:[],mfa:[]});function state(){try{return JSON.parse(localStorage.getItem(key)||'null')||blank()}catch{return blank()}}function save(x){localStorage.setItem(key,JSON.stringify(x));render()}function add(k,o){const x=state();x[k].unshift({id:k+'-'+Date.now(),...o,createdAt:new Date().toISOString()});save(x);document.getElementById('note').textContent='Saved'}function render(){document.getElementById('out').textContent=JSON.stringify(state(),null,2)}function clearAll(){localStorage.removeItem(key);render()}render()</script></body></html>
